services:
  # 1. Food Service
  - type: web
    name: food-service
    env: docker
    plan: free
    rootDir: food-service
    dockerfilePath: ./Dockerfile
    autoDeploy: true

  # 2. Nutrition Service
  - type: web
    name: nutrition-service
    env: docker
    plan: free
    rootDir: nutrition-service
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: USDA_API_KEY
        sync: false

  # 3. Gateway Service
  - type: web
    name: nutrition-gateway
    env: docker
    plan: free
    rootDir: gateway
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: FOOD_SERVICE_URL
        value: https://food-service.onrender.com
      - key: NUTRITION_SERVICE_URL
        value: https://nutrition-service.onrender.com